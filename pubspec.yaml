name: opus_mobile
description: "OPUS Mobile — Flutter application with modular architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.4.0

  # Navigation & deep linking
  go_router: ^13.0.0

  # HTTP client
  dio: ^5.4.0

  # Type-safe API calls
  retrofit: ^4.0.0

  # Offline-first storage
  hive_flutter: ^1.1.0

  # Immutable models (annotations only at runtime)
  freezed_annotation: ^2.4.0

  # JSON handling (annotations only at runtime)
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  retrofit_generator: ^8.0.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
